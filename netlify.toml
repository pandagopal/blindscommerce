[build]
  command = "npm install --no-save typescript@latest @types/node@latest eslint@latest eslint-config-next@latest && NEXT_TYPESCRIPT_IGNORE_ERRORS=true NEXT_ESLINT_IGNORE_ERRORS=true npm run build"
  publish = ".next"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/nextjs-server"
  status = 200
  force = true

[images]
  remote_images = ["https://source\\.unsplash\\.com/.*", "https://images\\.unsplash\\.com/.*", "https://ext\\.same-assets\\.com/.*", "https://ugc\\.same-assets\\.com/.*"]
